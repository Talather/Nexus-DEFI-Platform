specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: NexusStaking
    network: sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: NexusStaking
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Stake
        - Unstake
        - RewardClaim
        - RewardCompound
        - Pool
        - User
      abis:
        - name: NexusStaking
          file: ./abis/NexusStaking.json
      eventHandlers:
        - event: Staked(indexed address,indexed uint256,uint256,uint256)
          handler: handleStaked
        - event: Unstaked(indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handleUnstaked
        - event: RewardClaimed(indexed address,indexed uint256,uint256,uint256)
          handler: handleRewardClaimed
        - event: RewardCompounded(indexed address,indexed uint256,uint256,uint256)
          handler: handleRewardCompounded
        - event: PoolCreated(indexed uint256,address,address,uint256,uint256)
          handler: handlePoolCreated
        - event: PoolUpdated(indexed uint256,uint256,bool)
          handler: handlePoolUpdated
      file: ./src/mapping.ts
